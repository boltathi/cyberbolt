# ─── CyberBolt Production Overrides ───────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  redis:
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      target: production
    ports: []
    environment:
      - FLASK_ENV=production
      - DEBUG=false
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  frontend:
    ports: []
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NEXT_PUBLIC_SITE_URL=https://cyberbolt.in
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  nginx:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
