<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#2dd4bf" stroke-width="6" opacity="0.2"/>
  <!-- Shield shape -->
  <path d="M256 90 L350 150 L350 270 C350 330 310 370 256 400 C202 370 162 330 162 270 L162 150 Z" fill="none" stroke="url(#teal)" stroke-width="8"/>
  <!-- Lightning bolt inside shield -->
  <path d="M270 170 L240 250 L270 250 L242 330 L300 230 L268 230 Z" fill="url(#teal)"/>
  <!-- "CyberBolt" text -->
  <text x="256" y="460" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="48" fill="#2dd4bf" letter-spacing="2">CyberBolt</text>
</svg>
